<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Cosmos Hub</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070510;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --accent: #ff3d7f;
  --accent2: #7b5fff;
  --accent3: #00e5ff;
  --text: #f0eeff;
  --muted: #8a85a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-align: center;
  padding: 20px;
}

a { text-decoration: none; color: inherit; }

/* orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb1 { width: 500px; height: 500px; background: rgba(123,95,255,0.18); top: -150px; left: -100px; }
.orb2 { width: 400px; height: 400px; background: rgba(255,61,127,0.15); bottom: -100px; right: -100px; animation-delay: -5s; }

@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-25px); }
}

.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}

/* main content */
.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* big 404 number */
.four-o-four {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(120px, 20vw, 220px);
  font-weight: 700;
  line-height: 0.85;
  letter-spacing: -4px;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.04) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  margin-bottom: 10px;
  animation: glitch 6s ease-in-out infinite;
  user-select: none;
}

.four-o-four::before {
  content: '404';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: glitchColor 6s ease-in-out infinite;
  clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
}

@keyframes glitch {
  0%, 85%, 100% { transform: translate(0); }
  87% { transform: translate(-3px, 1px); }
  89% { transform: translate(3px, -1px); }
  91% { transform: translate(-2px, 2px); }
  93% { transform: translate(0); }
}

@keyframes glitchColor {
  0%, 85%, 100% { transform: translate(0); opacity: 1; }
  87% { transform: translate(4px, 0); opacity: 0.8; }
  89% { transform: translate(-4px, 0); opacity: 0.9; }
  91% { transform: translate(0); opacity: 1; }
}

.lost-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,61,127,0.3);
  background: rgba(255,61,127,0.08);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 24px;
}

.lost-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: blink 1.5s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.title {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.subtitle {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.65;
  max-width: 420px;
  margin-bottom: 40px;
}

.btn-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff;
  box-shadow: 0 0 30px rgba(123,95,255,0.3);
  transition: all 0.25s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(123,95,255,0.5);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--surface);
  transition: all 0.25s;
}

.btn-ghost:hover {
  border-color: rgba(255,255,255,0.2);
  color: #fff;
  background: var(--surface2);
}

/* floating asteroids */
.asteroid {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

.a1 { width: 12px; height: 12px; top: 20%; left: 15%; animation: float1 8s ease-in-out infinite; }
.a2 { width: 8px; height: 8px; top: 60%; left: 80%; animation: float2 11s ease-in-out infinite; }
.a3 { width: 16px; height: 16px; top: 75%; left: 25%; animation: float1 9s ease-in-out infinite reverse; }
.a4 { width: 6px; height: 6px; top: 30%; left: 70%; animation: float2 7s ease-in-out infinite; }
.a5 { width: 10px; height: 10px; top: 85%; left: 60%; animation: float1 13s ease-in-out infinite; }

@keyframes float1 {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  33% { transform: translate(20px,-15px) rotate(120deg); }
  66% { transform: translate(-10px,10px) rotate(240deg); }
}

@keyframes float2 {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  50% { transform: translate(-25px,20px) rotate(180deg); }
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 64px;
  background: rgba(7,5,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links { display: flex; gap: 4px; }

.nav-links a {
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  transition: all 0.2s;
}

.nav-links a:hover { color: #fff; background: var(--surface2); }

@media (max-width: 600px) {
  nav { padding: 0 18px; }
  .nav-links a { padding: 6px 10px; font-size: 13px; }
  .btn-group { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="grid-bg"></div>

<div class="asteroid a1"></div>
<div class="asteroid a2"></div>
<div class="asteroid a3"></div>
<div class="asteroid a4"></div>
<div class="asteroid a5"></div>

<nav>
  <div class="nav-logo">COSMOS HUB</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="my-games.html">Games</a>
    <a href="movies.html">Movies</a>
    <a href="music.html">Music</a>
  </div>
</nav>

<div class="content">
  <div class="four-o-four">404</div>
  <div class="lost-badge">Lost in Space</div>
  <h1 class="title">Page Not Found</h1>
  <p class="subtitle">Looks like this page drifted off into the void. It might have been moved, deleted, or never existed in the first place.</p>
  <div class="btn-group">
    <a href="index.html" class="btn-primary">🏠 Back to Home</a>
    <a href="my-games.html" class="btn-ghost">🎮 Browse Games</a>
  </div>
</div>

</body>
</html>
