<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - Luna</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04040a;
  --bg2: #080812;
  --surface: rgba(255,255,255,0.03);
  --surface2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --accent2: #7090ff;
  --moon: #e8eeff;
  --text: #d0d8f0;
  --muted: #606880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

a { text-decoration: none; color: inherit; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 58px;
  background: rgba(4,4,10,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}

.nav-logo {
  font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700;
  color: var(--moon); letter-spacing: 3px;
}
.nav-logo span { color: var(--accent2); }

.nav-links { display: flex; gap: 2px; }
.nav-links a {
  padding: 6px 14px; border-radius: 6px; font-size: 13px;
  font-weight: 500; color: var(--muted); transition: all 0.2s;
}
.nav-links a:hover { color: var(--text); background: var(--surface2); }
.nav-links a.active { color: #a0b8ff; }

.warning {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 24px;
  background: rgba(255,60,60,0.06);
  border-bottom: 1px solid rgba(255,60,60,0.12);
  flex-shrink: 0;
  font-size: 12px;
  color: rgba(255,150,150,0.8);
  font-family: 'Space Mono', monospace;
}

.warning::before { content: '//'; color: rgba(255,100,100,0.5); }

.padlet-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.padlet-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

@media (max-width: 600px) {
  nav { padding: 0 16px; }
  .nav-links a { padding: 5px 10px; font-size: 12px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">LU<span>NA</span></div>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="my-games.html">games</a>
    <a href="movies.html">movies</a>
    <a href="music.html">music</a>
    <a href="chat.html" class="active">chat</a>
  </div>
</nav>

<div class="warning">
  not responsible for anything posted here. keep it chill
</div>

<div class="padlet-wrap">
  <iframe
    src="https://padlet.com/embed/eskn8uzi4xw78m8h"
    frameborder="0"
    allow="camera;microphone;geolocation;display-capture;clipboard-write"
    style="width:100%;height:100%;display:block;padding:0;margin:0">
  </iframe>
</div>

</body>
</html>
