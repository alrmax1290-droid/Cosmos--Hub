<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVO - Cosmos Hub</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  font-family: Arial, sans-serif;
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #0b0b0b;
  border-bottom: 1px solid #222;
}

.topbar a {
  color: #ffb040;
  text-decoration: none;
  font-weight: bold;
}

.game-container {
  height: calc(100% - 60px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

button {
  background: #ffb040;
  border: none;
  padding: 8px 14px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>
<div class="topbar">
  <div>Cosmos Hub</div>
  <div>
    <a href="my-games.html">← Back</a>
    <button onclick="fullscreen()">Fullscreen</button>
  </div>
</div>

<div class="game-container">
  <iframe src="https://alrmax1290-droid.github.io/OVO/"></iframe>
</div>

<script>
function fullscreen() {
  document.querySelector("iframe").requestFullscreen();
}
</script>
</body>
</html>
