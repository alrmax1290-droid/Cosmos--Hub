  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;

      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      background: #0b0b0b;
      border-bottom: 1px solid #222;
    }

    .topbar a {
      color: #ffb040;
      text-decoration: none;
      font-weight: bold;
    }

    .center {
      min-height: calc(100% - 65px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    .box {
      max-width: 700px;
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 30px;
    }

    h1 {
      margin-top: 0;
      color: #ffb040;
    }

    p {
      color: #cfcfcf;
      line-height: 1.5;
    }
  </style>
</head>
