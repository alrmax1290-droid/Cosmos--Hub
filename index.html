<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos Hub</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #151515 0%, #050505 40%, #000 100%);
      color: white;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 30px;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid rgba(255,176,64,0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #ffb040;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a:hover {
      color: #ffb040;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin: 0;
    }

    .hero p {
      color: #ccc;
      margin-top: 10px;
    }

    /* SECTION */
    .section {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    /* GAME GRID */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(255,176,64,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,176,64,0.3);
      border-color: rgba(255,176,64,0.5);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card-content {
      padding: 12px;
    }

    .card-title {
      font-size: 18px;
      margin: 0;
    }

    .card-desc {
      font-size: 14px;
      color: #aaa;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #888;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="nav">
    <div class="logo">Cosmos Hub</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#games">Games</a>
      <a href="https://tellurideeducationassociation.org/page/music/index.html" target="_blank">Music</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Cosmos Hub</h1>
    <p>Your all-in-one hub for games, music, and more.</p>
  </div>

  <!-- GAMES -->
  <div class="section" id="games">
    <div class="section-title">Popular</div>

    <div class="games">

      <!-- GAME 1 -->
      <a href="game1.html" class="card">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f">
        <div class="card-content">
          <div class="card-title">Game 1</div>
          <div class="card-desc">Play your first game</div>
        </div>
      </a>

      <!-- GAME 2 -->
      <a href="game2.html" class="card">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <div class="card-content">
          <div class="card-title">Game 2</div>
          <div class="card-desc">Play your second game</div>
        </div>
      </a>

      <!-- GAME 3 -->
      <a href="game3.html" class="card">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <div class="card-content">
          <div class="card-title">Game 3</div>
          <div class="card-desc">More games here</div>
        </div>
      </a>

      <!-- GAME 4 -->
      <a href="game4.html" class="card">
        <img src="https://images.unsplash.com/photo-1560253023-3ec5d502959f">
        <div class="card-content">
          <div class="card-title">Game 4</div>
          <div class="card-desc">More games here</div>
        </div>
      </a>

      <!-- MUSIC CARD -->
      <a href="https://tellurideeducationassociation.org/page/music/index.html" target="_blank" class="card">
        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">
        <div class="card-content">
          <div class="card-title">Music</div>
          <div class="card-desc">Listen to music</div>
        </div>
      </a>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Cosmos Hub
  </div>

</body>
</html>
