<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dojo Hub</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #111);
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 16px 28px;
  background: rgba(0,0,0,0.85);
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #fff;
}

.nav-links {
  display: flex;
  gap: 18px;
}

.nav-links a {
  color: #ccc;
  transition: .2s;
}

.nav-links a:hover {
  color: white;
}

/* HERO */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 60px 20px;
  max-width: 1100px;
  margin: auto;
}

.hero h1 {
  font-size: 60px;
  margin: 0;
}

.hero p {
  color: #aaa;
  margin-top: 15px;
}

/* BUTTONS */
.hero-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 18px;
  border-radius: 10px;
  background: white;
  color: black;
  font-weight: bold;
}

/* YIN YANG */
.yin-container {
  display: flex;
  justify-content: center;
  align-items: center;
}

.yin-yang {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: linear-gradient(to bottom, black 50%, white 50%);
  position: relative;
  animation: spin 6s linear infinite;
}

.yin-yang::before,
.yin-yang::after {
  content: "";
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  left: 50%;
  transform: translateX(-50%);
}

.yin-yang::before {
  top: 0;
  background: white;
  box-shadow: inset 0 0 0 25px black;
}

.yin-yang::after {
  bottom: 0;
  background: black;
  box-shadow: inset 0 0 0 25px white;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* SECTIONS */
.section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #151515;
  border-radius: 12px;
  overflow: hidden;
  transition: .2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
}

.card-title {
  font-weight: bold;
}

.card-desc {
  font-size: 14px;
  color: #aaa;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #666;
}

/* MOBILE */
@media (max-width: 800px) {
  .hero {
    grid-template-columns: 1fr;
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">Dojo Hub</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="my-games.html">Games</a>
    <a href="movies.html">Movies</a>
    <a href="music.html">Music</a>
  </div>
</div>

<section class="hero">
  <div>
    <h1>Find Balance</h1>
    <p>Enter the dojo. Games, music, and movies in perfect harmony.</p>
    <a href="my-games.html" class="hero-btn">Enter</a>
  </div>

  <div class="yin-container">
    <div class="yin-yang"></div>
  </div>
</section>

<div class="section">
  <h2>Popular Games</h2>

  <div class="games-grid">
    <a href="play.html?game=geometrydash" class="card">
      <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/322170/capsule_616x353.jpg">
      <div class="card-content">
        <div class="card-title">Geometry Dash</div>
        <div class="card-desc">Rhythm platformer</div>
      </div>
    </a>

    <a href="play.html?game=ovo" class="card">
      <img src="https://www.coolmathgames.com/sites/default/files/OvO_OG-logo.jpg">
      <div class="card-content">
        <div class="card-title">OVO</div>
        <div class="card-desc">Parkour action</div>
      </div>
    </a>

    <a href="play.html?game=retrobowl" class="card">
      <img src="https://assets.nintendo.com/image/upload/c_fill,w_1200/q_auto:best/f_auto/dpr_2.0/store/software/switch/70010000048336/e3c1297d2ec30fe72a657af60c416d10c68a784bc874cf28e19cdf9261956919">
      <div class="card-content">
        <div class="card-title">Retro Bowl</div>
        <div class="card-desc">Football sim</div>
      </div>
    </a>

    <a href="play.html?game=fnaf1" class="card">
      <img src="https://cdn.jsdelivr.net/gh/gn-math/covers@main/38.png">
      <div class="card-content">
        <div class="card-title">FNAF 1</div>
        <div class="card-desc">Horror game</div>
      </div>
    </a>
  </div>
</div>

<div class="footer">
  © 2026 Dojo Hub
</div>

</body>
</html>
