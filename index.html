<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #151515, #000);
  color: white;
}

a { text-decoration: none; color: inherit; }

.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: #000;
  border-bottom: 1px solid #222;
}

.logo { color: #ffb040; font-size: 22px; font-weight: bold; }

.nav-links a { margin-left: 20px; }
.nav-links a:hover { color: #ffb040; }

.hero {
  text-align: center;
  padding: 50px;
}

.section {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #ffb040;
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">Cosmos Hub</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="my-games.html">My Games</a>
    <a href="movies.html">Movies</a>
    <a href="music.html">Music</a>
  </div>
</div>

<div class="hero">
  <h1>Cosmos Hub</h1>
  <p>Games, Movies, Music — all in one place</p>
</div>

<div class="section">
  <h2>Popular Games</h2>

  <div class="games">

    <a href="game1.html" class="card">
      <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f">
      <div class="card-content">Game 1</div>
    </a>

    <a href="game2.html" class="card">
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
      <div class="card-content">Game 2</div>
    </a>

    <a href="game3.html" class="card">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
      <div class="card-content">Game 3</div>
    </a>

    <a href="game4.html" class="card">
      <img src="https://images.unsplash.com/photo-1560253023-3ec5d502959f">
      <div class="card-content">Game 4</div>
    </a>

  </div>
</div>

</body>
</html>
