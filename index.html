<!DOCTYPE html>
<html>
<head>
  <title>Cosmos Hub</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #0a0a0a;
      border-bottom: 1px solid #222;
    }

    .nav h2 {
      margin: 0;
      color: #f5b041;
    }

    .nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 50px;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.2s;
      text-decoration: none;
      color: white;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="nav">
  <h2>Cosmos Hub</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Music</a>
  </div>
</div>

<h1>Cosmos Hub</h1>

<div class="games">
  <a href="game1.html" class="card">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <p>Game 1</p>
  </a>

  <a href="game2.html" class="card">
    <img src="https://images.unsplash.com/photo-1611605698335-8b1569810432">
    <p>Game 2</p>
  </a>
</div>

</body>
</html>
