<!DOCTYPE html>
<html>
<head>
  <title>PlayVerse</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 50px;
    }

    .games {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 10px;
      width: 200px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>PlayVerse</h1>

<div class="games">
  <a href="game1.html" class="card">
    <img src="https://via.placeholder.com/200">
    <p>Game 1</p>
  </a>

  <a href="game2.html" class="card">
    <img src="https://via.placeholder.com/200">
    <p>Game 2</p>
  </a>
</div>

</body>
</html>
