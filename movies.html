<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies - Cosmos Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#03030a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:#0b0b0b;
border-bottom:1px solid #222;
}

.topbar a{
color:#7fdcff;
text-decoration:none;
font-weight:bold;
}

iframe{
flex:1;
border:none;
width:100%;
}

/* loading */
.loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#03030a;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top-color:#7fdcff;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="loading" id="loader">
<div class="spinner"></div>
</div>

<div class="topbar">
<div>🎬 Movies</div>
<a href="index.html">← Home</a>
</div>

<iframe id="frame" src="https://discordexclusive-4.b-cdn.net/movies"></iframe>

<script>
const frame = document.getElementById("frame");
const loader = document.getElementById("loader");

frame.onload = () => {
loader.style.display = "none";
};

setTimeout(()=>loader.style.display="none",4000);
</script>

</body>
</html>
