<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies - Luna</title>
<link rel="icon" type="image/png" href="favicon.png"><link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070510;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --accent: #ff3d7f;
  --accent2: #7b5fff;
  --accent3: #00e5ff;
  --text: #f0eeff;
  --muted: #8a85a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

a { text-decoration: none; color: inherit; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(7,5,16,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
}

.nav-logo {
  font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, var(--accent3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.nav-links { display: flex; gap: 4px; }
.nav-links a { padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--muted); transition: all 0.2s; }
.nav-links a:hover { color: #fff; background: var(--surface2); }
.nav-links a.active { color: var(--accent3); }

.topbar {
  display: flex; align-items: center; padding: 10px 24px;
  background: rgba(7,5,16,0.85); border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 10px;
}

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent3); box-shadow: 0 0 8px var(--accent3);
  animation: blink 2s ease-in-out infinite; flex-shrink: 0;
}

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.topbar-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 1px; }
.topbar-tip { font-size: 12px; color: var(--muted); }

.frame-wrap { flex: 1; position: relative; overflow: hidden; }
.frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }

.loader {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); z-index: 5; gap: 16px; transition: opacity 0.3s;
}
.loader.hidden { opacity: 0; pointer-events: none; }

.loader-orb {
  width: 60px; height: 60px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  position: relative; animation: spin 2s linear infinite;
}
.loader-orb::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; background: var(--bg); }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 14px; color: var(--muted); font-weight: 600; }

@media (max-width: 700px) {
  nav { padding: 0 16px; height: 52px; }
  .nav-links a { padding: 5px 8px; font-size: 12px; }
  .nav-logo { font-size: 18px; }
  .topbar-tip { display: none; }
  .topbar { padding: 8px 16px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">LU<span>NA</span></a>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="singlefile.html">games</a>
    <a href="movies.html" class="active">movies</a>
    <a href="music.html">music</a>
    <a href="settings.html">settings</a>
  </div>
</nav>

<div class="topbar">
  <div class="live-dot"></div>
  <div class="topbar-title">🎬 Movies</div>
  <div class="topbar-tip">Stream directly in your browser</div>
</div>

<div class="frame-wrap">
  <div class="loader" id="loader">
    <div class="loader-orb"></div>
    <div class="loader-text">Loading Movies...</div>
  </div>
  <iframe
    id="frame"
    src="https://system.math.teachmetofish.net/"
    allow="autoplay; fullscreen; pointer-lock" sandbox="allow-scripts allow-same-origin allow-forms allow-popups-to-escape-sandbox"
    allowfullscreen>
  </iframe>
</div>

<script>
const frame = document.getElementById("frame");
const loader = document.getElementById("loader");
frame.onload = () => loader.classList.add("hidden");
setTimeout(() => loader.classList.add("hidden"), 5000);
</script>


<div id="pageTransition" style="position:fixed;inset:0;z-index:999999;background:#04040a;opacity:0;pointer-events:none;transition:opacity 0.25s ease;"></div>
<script>
// Page transitions
document.querySelectorAll('a[href]').forEach(link => {
  const href = link.getAttribute('href');
  if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('javascript')) return;
  link.addEventListener('click', e => {
    e.preventDefault();
    const o = document.getElementById('pageTransition');
    o.style.opacity = '1'; o.style.pointerEvents = 'all';
    setTimeout(() => { window.location.href = href; }, 250);
  });
});
window.addEventListener('load', () => {
  const o = document.getElementById('pageTransition');
  if (o) { o.style.opacity = '0'; o.style.pointerEvents = 'none'; }
});
// Panic button
document.addEventListener('keydown', e => {
  if (e.key === 'F1' && localStorage.getItem('luna_panic') !== 'false') {
    e.preventDefault();
    window.location.href = 'https://google.com';
  }
});
</script>
</body>
</html>
