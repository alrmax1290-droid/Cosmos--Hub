<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies - Cosmos Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at top, rgba(88, 63, 188, 0.35) 0%, rgba(25, 18, 60, 0.18) 20%, transparent 38%),
    linear-gradient(180deg, #050816 0%, #03030a 100%);
}

.stars {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(2px 2px at 20px 30px, white, transparent),
    radial-gradient(2px 2px at 80px 90px, white, transparent),
    radial-gradient(2px 2px at 140px 50px, white, transparent);
  background-size: 200px 200px;
  animation: moveStars 80s linear infinite;
  opacity: 0.4;
  z-index: -1;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

.box {
  background: rgba(10, 16, 36, 0.85);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(122, 188, 255, 0.2);
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(90,120,255,0.15);
}

h1 {
  margin: 0;
  font-size: 32px;
  color: #9bdfff;
}

p {
  margin-top: 10px;
  color: #b7c2e3;
}

a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 18px;
  border-radius: 10px;
  background: linear-gradient(135deg, #6d5dfc, #3ecbff);
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.25s;
}

a:hover {
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="box">
  <h1>🎬 Movies</h1>
  <p>🚧 This section is still being built.</p>
  <p>Coming soon: movie player + embedded content.</p>
  <a href="index.html">⬅ Return Home</a>
</div>

</body>
</html>
