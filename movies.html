<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies - Cosmos Hub</title>

<style>
body{
margin:0;
background:#03030a;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

.topbar{
padding:12px 18px;
background:#0b0b0b;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar-left{
font-weight:bold;
}

.topbar a{
color:#7fdcff;
text-decoration:none;
font-weight:bold;
}

iframe{
flex:1;
width:100%;
border:none;
background:black;
}

/* loader */
.loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#03030a;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top-color:#7fdcff;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div class="topbar">
<div class="topbar-left">🎬 Movies</div>
<a href="index.html">← Home</a>
</div>

<iframe
id="frame"
src="https://launch.newlifesanctuarychurch.com/"
allow="autoplay; fullscreen"
sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
</iframe>

<script>
const frame = document.getElementById("frame");
const loader = document.getElementById("loader");

frame.onload = () => {
loader.style.display = "none";
};

setTimeout(()=>{
loader.style.display="none";
},5000);
</script>

</body>
</html>
