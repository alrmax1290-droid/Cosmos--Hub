<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies - Cosmos Hub</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(88, 63, 188, 0.35) 0%, rgba(25, 18, 60, 0.18) 20%, transparent 38%),
    linear-gradient(180deg, #050816 0%, #03030a 100%);
}

.stars {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(2px 2px at 20px 30px, white, transparent),
    radial-gradient(2px 2px at 40px 70px, white, transparent);
  background-repeat: repeat;
  background-size: 220px 220px;
  animation: moveStars 120s linear infinite;
  opacity: .5;
  z-index: -1;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-220px); }
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:16px 28px;
  background:rgba(6,10,24,.8);
  border-bottom:1px solid rgba(120,170,255,.2);
}

.logo {
  font-weight:bold;
  color:#7fdcff;
}

.nav a {
  color:#cfd8f6;
  margin-left:15px;
}

.nav a.active {
  color:#7fdcff;
}

.frame-wrap {
  height: calc(100% - 70px);
  padding:10px;
}

iframe {
  width:100%;
  height:100%;
  border:none;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="nav">
  <div class="logo">Cosmos Hub</div>
  <div>
    <a href="index.html">Home</a>
    <a href="my-games.html">Games</a>
    <a href="movies.html" class="active">Movies</a>

</div>

</body>
