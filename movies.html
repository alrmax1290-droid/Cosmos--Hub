<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies - Cosmos Hub</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(88, 63, 188, 0.35) 0%, rgba(25, 18, 60, 0.18) 20%, transparent 38%),
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10) 0 1px, transparent 1px),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.08) 0 1px, transparent 1px),
    radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06) 0 1px, transparent 1px),
    linear-gradient(180deg, #050816 0%, #03030a 100%);
  background-size: auto, 180px 180px, 260px 260px, 320px 320px, auto;
}

a {
  text-decoration: none;
  color: inherit;
}

.stars,
.stars2,
.stars3 {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.stars {
  background:
    radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.9), transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent);
  background-repeat: repeat;
  background-size: 220px 220px;
  animation: moveStars 100s linear infinite;
  opacity: 0.6;
}

.stars2 {
  background:
    radial-gradient(1.5px 1.5px at 50px 50px, rgba(130,180,255,0.8), transparent),
    radial-gradient(2px 2px at 100px 150px, rgba(255,255,255,0.7), transparent);
  background-repeat: repeat;
  background-size: 300px 300px;
  animation: moveStars 160s linear infinite;
  opacity: 0.38;
}

.stars3 {
  background:
    radial-gradient(2px 2px at 80px 20px, rgba(170,140,255,0.7), transparent);
  background-repeat: repeat;
  background-size: 360px 360px;
  animation: moveStars 220s linear infinite;
  opacity: 0.28;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-220px); }
}

.wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 28px;
  background: rgba(6, 10, 24, 0.72);
  border-bottom: 1px solid rgba(120, 170, 255, 0.16);
  backdrop-filter: blur(14px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: #c9d7ff;
  text-shadow: 0 0 12px rgba(120,180,255,0.35);
}

.nav-links {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.nav-links a {
  color: #cfd8f6;
}

.nav-links a:hover,
.nav-links a.active {
  color: #7fdcff;
  text-shadow: 0 0 10px rgba(127,220,255,0.45);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(9, 14, 31, 0.72);
  border-bottom: 1px solid rgba(122, 188, 255, 0.12);
  backdrop-filter: blur(14px);
}

.topbar-title {
  font-size: 18px;
  font-weight: bold;
  color: #eef3ff;
}

.back-link {
  color: #7fdcff;
  font-weight: bold;
}

.frame-wrap {
  flex: 1;
  padding: 12px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 18px;
  background: #000;
  box-shadow: 0 0 24px rgba(90,120,255,0.12);
}
</style>
</head>

<body>
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="wrapper">
  <div class="nav">
    <div class="logo">Cosmos Hub</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="my-games.html">Games</a>
      <a href="movies.html" class="active">Movies</a>
      <a href="music.html">Music</a>
    </div>
  </div>

  <div class="topbar">
    <div class="topbar-title">Movies</div>
    <a href="index.html" class="back-link">← Back Home</a>
  </div>

  <div class="frame-wrap">
    <iframe src="https://tellurideeducationassociation.org/page/media/index.html"></iframe>
  </div>
</div>
</body>
</html>
