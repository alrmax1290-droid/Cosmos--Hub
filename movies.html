<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies - Cosmos Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#03030a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
background:#111;
padding:40px;
border-radius:12px;
border:1px solid rgba(127,220,255,.3);
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#7fdcff;
color:black;
font-weight:bold;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
color:#7fdcff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h1>🎬 Movies</h1>
<p>Click below to launch</p>

<button onclick="openMovies()">Launch Movies</button>

<a href="index.html">← Home</a>
</div>

<script>
function openMovies(){
const win = window.open("about:blank","_blank");

win.document.write(`
<html>
<head>
<title>Movies</title>
<style>
body{margin:0;background:black;}
iframe{width:100vw;height:100vh;border:none;}
</style>
</head>
<body>
<iframe src="https://axiseducation.one"></iframe>
</body>
</html>
`);
}
</script>

</body>
</html>
