<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music - Cosmos Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#03030a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* box */
.box{
background:#111;
padding:40px;
border-radius:16px;
border:1px solid rgba(127,220,255,.25);
box-shadow:0 0 25px rgba(90,150,255,.15);
}

/* button */
button{
margin-top:20px;
padding:14px 22px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6d5dfc,#3ecbff);
color:white;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(90,150,255,.25);
}

a{
display:block;
margin-top:15px;
color:#7fdcff;
text-decoration:none;
}

/* loading */
.loading{
position:fixed;
inset:0;
background:#03030a;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top-color:#7fdcff;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="loading" id="loader">
<div style="font-size:24px;margin-bottom:10px;">Launching Music...</div>
<div class="spinner"></div>
</div>

<div class="box">
<h1>🎵 Music</h1>
<p>Launch the music player</p>

<button onclick="launchMusic()">Launch Music</button>

<a href="index.html">← Home</a>
</div>

<script>
function launchMusic(){

const win = window.open("about:blank","_blank");

win.document.write(`
<html>
<head>
<title>Music</title>
<style>
body{margin:0;background:black;}
iframe{width:100vw;height:100vh;border:none;}
</style>
</head>
<body>

<iframe src="https://mono.geeked.wtf/"></iframe>

</body>
</html>
`);

document.getElementById("loader").style.display="none";
}
</script>

</body>
</html>
