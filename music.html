<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music - Cosmos Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#03030a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* box */
.box{
background:#111;
padding:40px;
border-radius:16px;
border:1px solid rgba(127,220,255,.25);
box-shadow:0 0 25px rgba(90,150,255,.15);
}

button{
margin-top:20px;
padding:14px 22px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6d5dfc,#3ecbff);
color:white;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

a{
display:block;
margin-top:15px;
color:#7fdcff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h1>🎵 Music</h1>
<p>Launch the music player</p>

<button onclick="launchMusic()">Launch Music</button>

<a href="index.html">← Home</a>
</div>

<script>
function launchMusic(){

const win = window.open("about:blank","_blank");

win.document.write(`
<html>
<head>
<title>Music</title>
<style>
body{margin:0;background:black;}
iframe{width:100vw;height:100vh;border:none;}
</style>
</head>
<body>
<iframe src="https://mono.geeked.wtf/"></iframe>
</body>
</html>
`);

}
</script>

</body>
</html>
