<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music - Cosmos Hub</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      background: #0b0b0b;
      border-bottom: 1px solid #222;
    }

    .topbar a {
      color: #ffb040;
      text-decoration: none;
      font-weight: bold;
    }

    .wrap {
      height: calc(100% - 65px);
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>Cosmos Hub Music</div>
    <a href="index.html">← Back Home</a>
  </div>

  <div class="wrap">
    <iframe
      src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>
</body>
</html>
