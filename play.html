<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game - Cosmos Hub</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #151515 0%, #050505 40%, #000 100%);
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(0, 0, 0, 0.92);
  border-bottom: 1px solid rgba(255, 176, 64, 0.2);
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.brand-name {
  font-size: 22px;
  font-weight: bold;
  color: #ffb040;
}

.game-title {
  font-size: 14px;
  color: #c7c7c7;
}

.topbar a {
  color: #ffb040;
  text-decoration: none;
  font-weight: bold;
}

.topbar a:hover {
  opacity: 0.9;
}

.frame-wrap {
  flex: 1;
  padding: 12px;
}

.game-frame {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 14px;
  background: #000;
}

.message {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 30px;
  color: #d0d0d0;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-name">Cosmos Hub</div>
    <div class="game-title" id="gameTitle">Loading game...</div>
  </div>
  <a href="my-games.html">← Back to Games</a>
</div>

<div class="frame-wrap" id="frameWrap">
  <iframe id="gameFrame" class="game-frame" allowfullscreen></iframe>
</div>

<div class="message" id="messageBox">
  Game not added yet.
</div>

const game = params.get("game");

  },

  },

  },
  fnaf3: {
    title: "FNAF 3",

  },
  fnaf4: {
    title: "FNAF 4",
    url: "https://alrmax1290-droid.github.io/fnaf4/"
  },
  sisterlocation: {

  },

  },

  },
  fused: {

  },
  christmasmassacre: {

const gameFrame = document.getElementById("gameFrame");
const gameTitle = document.getElementById("gameTitle");
const frameWrap = document.getElementById("frameWrap");
const messageBox = document.getElementById("messageBox");

if (game && games[game] && games[game].url) {
  gameTitle.textContent = games[game].title;
  document.title = games[game].title + " - Cosmos Hub";
  gameFrame.src = games[game].url;
} else {
  gameTitle.textContent = "Game not found";
  document.title = "Game Not Found - Cosmos Hub";
  frameWrap.style.display = "none";
  messageBox.style.display = "flex";
}
</script>

</body>
</html>
