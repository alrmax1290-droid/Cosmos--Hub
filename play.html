<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game - Cosmos Hub</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
color:white;
display:flex;
flex-direction:column;
height:100vh;
background:#03030a;
overflow:hidden;
}

/* loading */
.loading-screen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#03030a;
z-index:9999;
transition:.3s;
}

.loading-screen.hidden{
opacity:0;
pointer-events:none;
}

.loading-spinner{
width:60px;
height:60px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top-color:#7fdcff;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:#0b0b0b;
border-bottom:1px solid #222;
gap:10px;
flex-wrap:wrap;
}

.topbar-left{
font-weight:bold;
}

.topbar-right{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.topbar a,
.topbar button{
color:#7fdcff;
background:none;
border:1px solid rgba(127,220,255,.3);
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.topbar button:hover,
.topbar a:hover{
background:rgba(127,220,255,.1);
}

iframe{
flex:1;
width:100%;
border:none;
}
</style>
</head>

<body>

<div id="loadingScreen" class="loading-screen">
<div style="font-size:26px;margin-bottom:15px;">Cosmos Hub</div>
<div class="loading-spinner"></div>
<div style="margin-top:10px;">Launching...</div>
</div>

<div class="topbar">
<div class="topbar-left" id="gameTitle">Loading...</div>

<div class="topbar-right">
<a href="my-games.html">← Back</a>
<button id="fullscreenBtn">Fullscreen</button>
<button id="blankBtn">Open in Blank</button>
</div>
</div>

<iframe id="gameFrame"></iframe>

<script>
(function(){

const params = new URLSearchParams(window.location.search);
const gameKey = params.get("game");

const games = {
geometrydash:"https://alrmax1290-droid.github.io/GEOMETRYDASH/",
ovo:"https://alrmax1290-droid.github.io/OVO/",
retrobowl:"https://alrmax1290-droid.github.io/RETROBOWL/",
brotato:"https://alrmax1290-droid.github.io/BROTATO/",
baldi:"https://alrmax1290-droid.github.io/BaldisBasics-/",
fnaf1:"https://alrmax1290-droid.github.io/fnaf1/",
fnaf2:"https://alrmax1290-droid.github.io/fnaf2/",
fnaf3:"https://alrmax1290-droid.github.io/fnaf3/",
fnaf4:"https://alrmax1290-droid.github.io/fnaf4/",
sisterlocation:"https://alrmax1290-droid.github.io/fnafsl/",
pizzeriasim:"https://alrmax1290-droid.github.io/fnafps/",
ucn:"https://alrmax1290-droid.github.io/fnafucn/",
fnafworld:"https://alrmax1290-droid.github.io/fnafworld/",
shrekhotel:"https://alrmax1290-droid.github.io/fnas/",
candys1:"https://alrmax1290-droid.github.io/fnac/",
candys2:"https://alrmax1290-droid.github.io/fnac2/",
brawlsimulator:"https://alrmax1290-droid.github.io/brawlsimulator/",
survivorio:"https://alrmax1290-droid.github.io/SURVIVORIO/",
plinko:"https://alrmax1290-droid.github.io/PLINKO/",
ironlung:"https://alrmax1290-droid.github.io/IRONGLOUNG/",
cloverpit:"https://alrmax1290-droid.github.io/CLOVERPIT/",
fivenightsatepsteins:"https://alrmax1290-droid.github.io/Five-Nights-at-Epsteins/",
bartblast:"https://alrmax1290-droid.github.io/BARTBLAST/",
fused:"https://alrmax1290-droid.github.io/Fused/",
christmasmassacre:"https://alrmax1290-droid.github.io/ChristmasMassacre/",
cellmachine:"https://alrmax1290-droid.github.io/CellMachine/"
};

const frame = document.getElementById("gameFrame");
const title = document.getElementById("gameTitle");
const loader = document.getElementById("loadingScreen");

if(!gameKey || !games[gameKey]){
title.innerText="Game not found";
loader.classList.add("hidden");
return;
}

title.innerText = gameKey;

frame.src = games[gameKey];

frame.onload = function(){
loader.classList.add("hidden");
};

setTimeout(()=>loader.classList.add("hidden"),4000);

/* fullscreen */
document.getElementById("fullscreenBtn").onclick=function(){
if(frame.requestFullscreen){
frame.requestFullscreen();
}
};

/* about blank */
document.getElementById("blankBtn").onclick=function(){
const newWin = window.open("about:blank");
newWin.document.write(`
<iframe src="${games[gameKey]}" style="border:none;width:100vw;height:100vh;"></iframe>
`);
newWin.document.title="Cosmos Hub";
};

})();
</script>

</body>
</html>
