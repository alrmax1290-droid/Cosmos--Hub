<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game - Cosmos Hub</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(88, 63, 188, 0.35) 0%, rgba(25, 18, 60, 0.18) 20%, transparent 38%),
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10) 0 1px, transparent 1px),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.08) 0 1px, transparent 1px),
    radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06) 0 1px, transparent 1px),
    linear-gradient(180deg, #050816 0%, #03030a 100%);
  background-size: auto, 180px 180px, 260px 260px, 320px 320px, auto;
}

.stars,
.stars2,
.stars3 {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.stars {
  background:
    radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.9), transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent);
  background-repeat: repeat;
  background-size: 220px 220px;
  animation: moveStars 100s linear infinite;
  opacity: 0.6;
}

.stars2 {
  background:
    radial-gradient(1.5px 1.5px at 50px 50px, rgba(130,180,255,0.8), transparent),
    radial-gradient(2px 2px at 100px 150px, rgba(255,255,255,0.7), transparent);
  background-repeat: repeat;
  background-size: 300px 300px;
  animation: moveStars 160s linear infinite;
  opacity: 0.38;
}

.stars3 {
  background:
    radial-gradient(2px 2px at 80px 20px, rgba(170,140,255,0.7), transparent);
  background-repeat: repeat;
  background-size: 360px 360px;
  animation: moveStars 220s linear infinite;
  opacity: 0.28;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-220px); }
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(6, 10, 24, 0.72);
  border-bottom: 1px solid rgba(120, 170, 255, 0.16);
  backdrop-filter: blur(14px);
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.brand-name {
  font-size: 22px;
  font-weight: bold;
  color: #c9d7ff;
  text-shadow: 0 0 12px rgba(120,180,255,0.35);
}

.game-title {
  font-size: 14px;
  color: #b7c2e3;
}

.topbar a {
  color: #7fdcff;
  text-decoration: none;
  font-weight: bold;
}

.frame-wrap {
  flex: 1;
  padding: 12px;
}

.game-frame {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 18px;
  background: #000;
  box-shadow: 0 0 24px rgba(90,120,255,0.12);
}

.message {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 30px;
  color: #d0daf3;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-name">Cosmos Hub</div>
    <div class="game-title" id="gameTitle">Loading game...</div>
  </div>
  <a href="my-games.html">← Back to Games</a>
</div>

<div class="frame-wrap" id="frameWrap">
  <iframe id="gameFrame" class="game-frame" allowfullscreen></iframe>
</div>

<div class="message" id="messageBox">
  Game not added yet.
</div>

<script>
const params = new URLSearchParams(window.location.search);
const game = params.get("game");

const games = {
  geometrydash: { title: "Geometry Dash", url: "https://alrmax1290-droid.github.io/GEOMETRYDASH/" },
  ovo: { title: "OVO", url: "https://alrmax1290-droid.github.io/OVO/" },
  retrobowl: { title: "Retro Bowl", url: "https://alrmax1290-droid.github.io/RETROBOWL/" },
  brotato: { title: "Brotato", url: "https://alrmax1290-droid.github.io/BROTATO/" },
  baldi: { title: "Baldi's Basics Plus", url: "https://alrmax1290-droid.github.io/BaldisBasics-/" },
  halflife2: { title: "Half-Life 2", url: "https://alrmax1290-droid.github.io/HalfLife/" },
  snowrider: { title: "Snow Rider 3D", url: "https://alrmax1290-droid.github.io/SNOWRIDER3D/" },
  blockblast: { title: "Block Blast", url: "https://alrmax1290-droid.github.io/block-blast/" },
  cellmachine: { title: "Cell Machine", url: "https://alrmax1290-droid.github.io/CellMachine/" },
  isaac: { title: "The Binding of Isaac", url: "https://alrmax1290-droid.github.io/BINDINGOFISAAC1/" },
  fnaf1: { title: "FNAF 1", url: "https://alrmax1290-droid.github.io/fnaf1/" },
  fnaf2: { title: "FNAF 2", url: "https://alrmax1290-droid.github.io/fnaf2/" },
  fnaf3: { title: "FNAF 3", url: "https://alrmax1290-droid.github.io/fnaf3/" },
  fnaf4: { title: "FNAF 4", url: "https://alrmax1290-droid.github.io/fnaf4/" },
  sisterlocation: { title: "Sister Location", url: "https://alrmax1290-droid.github.io/fnafsl/" },
  pizzeriasim: { title: "Pizzeria Simulator", url: "https://alrmax1290-droid.github.io/fnafps/" },
  ucn: { title: "Ultimate Custom Night", url: "https://alrmax1290-droid.github.io/fnafucn/" },
  fnafworld: { title: "FNAF World", url: "https://alrmax1290-droid.github.io/fnafworld/" },
  shrekhotel: { title: "Five Nights at Shrek's Hotel", url: "https://alrmax1290-droid.github.io/fnas/" },
  candys1: { title: "Five Nights at Candy's 1", url: "https://alrmax1290-droid.github.io/fnac/" },
  candys2: { title: "Five Nights at Candy's 2", url: "https://alrmax1290-droid.github.io/fnac2/" },
  brawlsimulator: { title: "Brawl Simulator", url: "https://alrmax1290-droid.github.io/brawlsimulator/" },
  survivorio: { title: "Survivor IO", url: "https://alrmax1290-droid.github.io/SURVIVORIO/" },
  plinko: { title: "Plinko", url: "https://alrmax1290-droid.github.io/PLINKO/" },
  ironlung: { title: "Iron Lung", url: "https://alrmax1290-droid.github.io/IRONGLOUNG/" },
  cloverpit: { title: "Clover Pit", url: "https://alrmax1290-droid.github.io/CLOVERPIT/" },
  fivenightsatepsteins: { title: "Five Nights at Epstein's", url: "https://alrmax1290-droid.github.io/Five-Nights-at-Epsteins/" },
  bartblast: { title: "Bart Blast", url: "https://alrmax1290-droid.github.io/BARTBLAST/" },
  fused: { title: "Fused", url: "https://alrmax1290-droid.github.io/Fused/" },
  christmasmassacre: { title: "Christmas Massacre", url: "https://alrmax1290-droid.github.io/ChristmasMassacre/" }
};

const gameFrame = document.getElementById("gameFrame");
const gameTitle = document.getElementById("gameTitle");
const frameWrap = document.getElementById("frameWrap");
const messageBox = document.getElementById("messageBox");

if (game && games[game] && games[game].url) {
  gameTitle.textContent = games[game].title;
  document.title = games[game].title + " - Cosmos Hub";
  gameFrame.src = games[game].url;
} else {
  gameTitle.textContent = "Game not found";
  document.title = "Game Not Found - Cosmos Hub";
  frameWrap.style.display = "none";
  messageBox.style.display = "flex";
}
</script>

</body>
</html>
