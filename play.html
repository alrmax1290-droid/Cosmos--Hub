<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game - Cosmos Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #03030a;
  overflow: hidden;
}

.loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top, rgba(88, 63, 188, 0.25) 0%, rgba(25, 18, 60, 0.12) 25%, transparent 50%),
    #03030a;
  z-index: 9999;
  transition: opacity 0.3s ease;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-title {
  font-size: 26px;
  margin-bottom: 15px;
  font-weight: bold;
  color: #eaf3ff;
}

.loading-spinner {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,.1);
  border-top-color: #7fdcff;
  animation: spin 1s linear infinite;
}

.loading-text {
  margin-top: 12px;
  color: #a9c6df;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(11,11,11,0.95);
  border-bottom: 1px solid #222;
  gap: 10px;
  flex-wrap: wrap;
}

.topbar-left {
  font-weight: bold;
  color: #eef3ff;
}

.topbar-right {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.topbar a,
.topbar button {
  color: #7fdcff;
  background: none;
  border: 1px solid rgba(127,220,255,.3);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  text-decoration: none;
}

.topbar button:hover,
.topbar a:hover {
  background: rgba(127,220,255,.1);
}

iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #000;
}

.missing-wrap {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.missing-box {
  background: rgba(10, 16, 36, 0.85);
  border: 1px solid rgba(122, 188, 255, 0.20);
  border-radius: 18px;
  padding: 30px;
  text-align: center;
  max-width: 500px;
}

.missing-box h2 {
  margin-top: 0;
  color: #9bdfff;
}

.missing-box p {
  color: #b7c2e3;
  line-height: 1.5;
}

.missing-box a {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 16px;
  border-radius: 10px;
  background: linear-gradient(135deg, #6d5dfc, #3ecbff);
  color: white;
  text-decoration: none;
  font-weight: bold;
}

@media (max-width: 700px) {
  .topbar {
    padding: 12px 14px;
  }

  .topbar-left {
    width: 100%;
  }

  .topbar-right {
    width: 100%;
  }

  .topbar a,
  .topbar button {
    flex: 1 1 auto;
    text-align: center;
  }
}
</style>
</head>

<body>

<div id="loadingScreen" class="loading-screen">
  <div class="loading-title">Cosmos Hub</div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Launching...</div>
</div>

<div class="topbar">
  <div class="topbar-left" id="gameTitle">Loading...</div>

  <div class="topbar-right">
    <a href="my-games.html">← Back</a>
    <button id="fullscreenBtn" type="button">Fullscreen</button>
    <button id="blankBtn" type="button">Open in Blank</button>
  </div>
</div>

<iframe id="gameFrame" allowfullscreen referrerpolicy="no-referrer"></iframe>

<div class="missing-wrap" id="missingWrap">
  <div class="missing-box">
    <h2>Game not found</h2>
    <p>The game you tried to open does not exist in the launcher list.</p>
    <a href="my-games.html">Go back to Games</a>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const gameKey = params.get("game");

  const games = {
    geometrydash: {
      title: "Geometry Dash",
      url: "https://alrmax1290-droid.github.io/GEOMETRYDASH/"
    },
    ovo: {
      title: "OVO",
      url: "https://alrmax1290-droid.github.io/OVO/"
    },
    retrobowl: {
      title: "Retro Bowl",
      url: "https://alrmax1290-droid.github.io/RETROBOWL/"
    },
    brotato: {
      title: "Brotato",
      url: "https://alrmax1290-droid.github.io/BROTATO/"
    },
    baldi: {
      title: "Baldi's Basics Plus",
      url: "https://alrmax1290-droid.github.io/BaldisBasics-/"
    },
    fnaf1: {
      title: "FNAF 1",
      url: "https://alrmax1290-droid.github.io/fnaf1/"
    },
    fnaf2: {
      title: "FNAF 2",
      url: "https://alrmax1290-droid.github.io/fnaf2/"
    },
    fnaf3: {
      title: "FNAF 3",
      url: "https://alrmax1290-droid.github.io/fnaf3/"
    },
    fnaf4: {
      title: "FNAF 4",
      url: "https://alrmax1290-droid.github.io/fnaf4/"
    },
    sisterlocation: {
      title: "Sister Location",
      url: "https://alrmax1290-droid.github.io/fnafsl/"
    },
    pizzeriasim: {
      title: "Pizzeria Simulator",
      url: "https://alrmax1290-droid.github.io/fnafps/"
    },
    ucn: {
      title: "Ultimate Custom Night",
      url: "https://alrmax1290-droid.github.io/fnafucn/"
    },
    fnafworld: {
      title: "FNAF World",
      url: "https://alrmax1290-droid.github.io/fnafworld/"
    },
    shrekhotel: {
      title: "Five Nights at Shrek's Hotel",
      url: "https://alrmax1290-droid.github.io/fnas/"
    },
    candys1: {
      title: "Five Nights at Candy's 1",
      url: "https://alrmax1290-droid.github.io/fnac/"
    },
    candys2: {
      title: "Five Nights at Candy's 2",
      url: "https://alrmax1290-droid.github.io/fnac2/"
    },
    brawlsimulator: {
      title: "Brawl Simulator",
      url: "https://alrmax1290-droid.github.io/brawlsimulator/"
    },
    survivorio: {
      title: "Survivor IO",
      url: "https://alrmax1290-droid.github.io/SURVIVORIO/"
    },
    plinko: {
      title: "Plinko",
      url: "https://alrmax1290-droid.github.io/PLINKO/"
    },
    ironlung: {
      title: "Iron Lung",
      url: "https://alrmax1290-droid.github.io/IRONGLOUNG/"
    },
    cloverpit: {
      title: "Clover Pit",
      url: "https://alrmax1290-droid.github.io/CLOVERPIT/"
    },
    fivenightsatepsteins: {
      title: "Five Nights at Epstein's",
      url: "https://alrmax1290-droid.github.io/Five-Nights-at-Epsteins/"
    },
    bartblast: {
      title: "Bart Blast",
      url: "https://alrmax1290-droid.github.io/BARTBLAST/"
    },
    fused: {
      title: "Fused",
      url: "https://alrmax1290-droid.github.io/Fused/"
    },
    christmasmassacre: {
      title: "Christmas Massacre",
      url: "https://alrmax1290-droid.github.io/ChristmasMassacre/"
    },
    cellmachine: {
      title: "Cell Machine",
      url: "https://alrmax1290-droid.github.io/CellMachine/"
    }
  };

  const frame = document.getElementById("gameFrame");
  const title = document.getElementById("gameTitle");
  const loader = document.getElementById("loadingScreen");
  const missingWrap = document.getElementById("missingWrap");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const blankBtn = document.getElementById("blankBtn");

  function hideLoader() {
    loader.classList.add("hidden");
  }

  if (!gameKey || !games[gameKey]) {
    title.textContent = "Game not found";
    frame.style.display = "none";
    missingWrap.style.display = "flex";
    hideLoader();
    fullscreenBtn.disabled = true;
    blankBtn.disabled = true;
    return;
  }

  const currentGame = games[gameKey];

  title.textContent = currentGame.title;
  document.title = currentGame.title + " - Cosmos Hub";
  frame.src = currentGame.url;

  frame.addEventListener("load", hideLoader);
  setTimeout(hideLoader, 4000);

  fullscreenBtn.addEventListener("click", function () {
    if (document.fullscreenElement) {
      document.exitFullscreen();
      return;
    }

    if (frame.requestFullscreen) {
      frame.requestFullscreen();
    } else if (frame.webkitRequestFullscreen) {
      frame.webkitRequestFullscreen();
    }
  });

  blankBtn.addEventListener("click", function () {
    const newWin = window.open("about:blank", "_blank");

    if (!newWin) return;

    newWin.document.write(`
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <title>${currentGame.title} - Cosmos Hub</title>
        <style>
          html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
          }
          iframe {
            border: none;
            width: 100vw;
            height: 100vh;
            display: block;
          }
        </style>
      </head>
      <body>
        <iframe src="${currentGame.url}" allowfullscreen referrerpolicy="no-referrer"></iframe>
      </body>
      </html>
    `);
    newWin.document.close();
  });
})();
</script>

</body>
</html>
