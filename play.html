<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play - Cosmos Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070510;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --accent: #ff3d7f;
  --accent2: #7b5fff;
  --accent3: #00e5ff;
  --text: #f0eeff;
  --muted: #8a85a8;
  --glow-pink: rgba(255,61,127,0.4);
  --glow-purple: rgba(123,95,255,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

a { text-decoration: none; color: inherit; }

/* ── LOADING SCREEN ── */
.loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 9999;
  transition: opacity 0.4s ease;
  gap: 20px;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-orb {
  position: relative;
  width: 80px;
  height: 80px;
}

.loading-orb-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(123,95,255,0.4), rgba(255,61,127,0.2), transparent);
  animation: pulse 2s ease-in-out infinite;
}

.loading-orb-core {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: linear-gradient(145deg, #7b5fff, #ff3d7f);
  animation: spin 2s linear infinite;
}

.loading-orb-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--accent3);
  border-right-color: var(--accent);
  animation: spin 1.2s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}

.loading-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.loading-game-name {
  font-size: 16px;
  color: var(--muted);
  font-weight: 600;
}

.loading-bar-wrap {
  width: 200px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 999px;
  overflow: hidden;
}

.loading-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 999px;
  animation: loadBar 3s ease-out forwards;
}

@keyframes loadBar {
  from { width: 0%; }
  to { width: 100%; }
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: rgba(7,5,16,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
  gap: 12px;
  z-index: 10;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.topbar-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1.5px;
  background: linear-gradient(135deg, #fff, var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  flex-shrink: 0;
}

.topbar-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

.topbar-game-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-right {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.tb-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  white-space: nowrap;
}

.tb-btn:hover {
  color: #fff;
  background: var(--surface2);
  border-color: rgba(255,255,255,0.15);
}

.tb-btn.primary {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 0 16px var(--glow-purple);
}

.tb-btn.primary:hover {
  box-shadow: 0 0 28px var(--glow-purple);
  transform: translateY(-1px);
}

.tb-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
}

/* ── GAME FRAME ── */
iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #000;
  display: block;
}

/* ── MISSING GAME ── */
.missing-wrap {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: var(--bg);
}

.missing-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
  max-width: 480px;
}

.missing-icon {
  font-size: 52px;
  margin-bottom: 20px;
  display: block;
}

.missing-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 10px;
}

.missing-text {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 24px;
}

.missing-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s;
  box-shadow: 0 0 20px var(--glow-purple);
}

.missing-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 35px var(--glow-purple);
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .topbar { padding: 0 12px; height: 48px; }
  .topbar-logo { font-size: 16px; }
  .tb-btn { padding: 6px 10px; font-size: 12px; }
  .topbar-game-name { font-size: 13px; }
}

@media (max-width: 420px) {
  .topbar-logo { display: none; }
  .topbar-divider { display: none; }
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-orb">
    <div class="loading-orb-glow"></div>
    <div class="loading-orb-core"></div>
    <div class="loading-orb-ring"></div>
  </div>
  <div class="loading-title">COSMOS HUB</div>
  <div class="loading-game-name" id="loadingGameName">Launching...</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar"></div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">COSMOS</div>
    <div class="topbar-divider"></div>
    <div class="topbar-game-name" id="gameTitle">Loading...</div>
  </div>
  <div class="topbar-right">
    <a href="my-games.html" class="tb-btn">← Back</a>
    <button id="fullscreenBtn" class="tb-btn primary" type="button">⛶ Fullscreen</button>
    <button id="blankBtn" class="tb-btn" type="button">↗ New Tab</button>
  </div>
</div>

<!-- GAME FRAME -->
<iframe id="gameFrame" allowfullscreen referrerpolicy="no-referrer"></iframe>

<!-- MISSING GAME -->
<div class="missing-wrap" id="missingWrap">
  <div class="missing-box">
    <span class="missing-icon">🚫</span>
    <div class="missing-title">Game Not Found</div>
    <div class="missing-text">The game you're looking for doesn't exist in the launcher. Head back and pick something else.</div>
    <a href="my-games.html" class="missing-btn">← Back to Games</a>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const gameKey = params.get("game");

  const games = {
    geometrydash: { title: "Geometry Dash", url: "https://alrmax1290-droid.github.io/GEOMETRYDASH/" },
    ovo: { title: "OVO", url: "https://alrmax1290-droid.github.io/OVO/" },
    retrobowl: { title: "Retro Bowl", url: "https://alrmax1290-droid.github.io/RETROBOWL/" },
    brotato: { title: "Brotato", url: "https://alrmax1290-droid.github.io/BROTATO/" },
    baldi: { title: "Baldi's Basics Plus", url: "https://alrmax1290-droid.github.io/BaldisBasics-/" },
    fnaf1: { title: "FNAF 1", url: "https://alrmax1290-droid.github.io/fnaf1/" },
    fnaf2: { title: "FNAF 2", url: "https://alrmax1290-droid.github.io/fnaf2/" },
    fnaf3: { title: "FNAF 3", url: "https://alrmax1290-droid.github.io/fnaf3/" },
    fnaf4: { title: "FNAF 4", url: "https://alrmax1290-droid.github.io/fnaf4/" },
    sisterlocation: { title: "Sister Location", url: "https://alrmax1290-droid.github.io/fnafsl/" },
    pizzeriasim: { title: "Pizzeria Simulator", url: "https://alrmax1290-droid.github.io/fnafps/" },
    ucn: { title: "Ultimate Custom Night", url: "https://alrmax1290-droid.github.io/fnafucn/" },
    fnafworld: { title: "FNAF World", url: "https://alrmax1290-droid.github.io/fnafworld/" },
    shrekhotel: { title: "Five Nights at Shrek's Hotel", url: "https://alrmax1290-droid.github.io/fnas/" },
    candys1: { title: "Five Nights at Candy's 1", url: "https://alrmax1290-droid.github.io/fnac/" },
    candys2: { title: "Five Nights at Candy's 2", url: "https://alrmax1290-droid.github.io/fnac2/" },
    brawlsimulator: { title: "Brawl Simulator", url: "https://alrmax1290-droid.github.io/brawlsimulator/" },
    survivorio: { title: "Survivor IO", url: "https://alrmax1290-droid.github.io/SURVIVORIO/" },
    plinko: { title: "Plinko", url: "https://alrmax1290-droid.github.io/PLINKO/" },
    ironlung: { title: "Iron Lung", url: "https://alrmax1290-droid.github.io/IRONGLOUNG/" },
    cloverpit: { title: "Clover Pit", url: "https://alrmax1290-droid.github.io/CLOVERPIT/" },
    fivenightsatepsteins: { title: "Five Nights at Epstein's", url: "https://alrmax1290-droid.github.io/Five-Nights-at-Epsteins/" },
    bartblast: { title: "Bart Blast", url: "https://alrmax1290-droid.github.io/BARTBLAST/" },
    fused: { title: "Fused", url: "https://alrmax1290-droid.github.io/Fused/" },
    christmasmassacre: { title: "Christmas Massacre", url: "https://alrmax1290-droid.github.io/ChristmasMassacre/" },
    cellmachine: { title: "Cell Machine", url: "https://alrmax1290-droid.github.io/CellMachine/" }
  };

  const frame = document.getElementById("gameFrame");
  const titleEl = document.getElementById("gameTitle");
  const loadingNameEl = document.getElementById("loadingGameName");
  const loader = document.getElementById("loadingScreen");
  const missingWrap = document.getElementById("missingWrap");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const blankBtn = document.getElementById("blankBtn");

  function hideLoader() {
    loader.classList.add("hidden");
  }

  if (!gameKey || !games[gameKey]) {
    titleEl.textContent = "Game not found";
    frame.style.display = "none";
    missingWrap.style.display = "flex";
    hideLoader();
    fullscreenBtn.disabled = true;
    blankBtn.disabled = true;
    return;
  }

  const currentGame = games[gameKey];

  titleEl.textContent = currentGame.title;
  loadingNameEl.textContent = currentGame.title;
  document.title = currentGame.title + " — Cosmos Hub";
  frame.src = currentGame.url;

  frame.addEventListener("load", hideLoader);
  setTimeout(hideLoader, 4000);

  fullscreenBtn.addEventListener("click", function () {
    if (document.fullscreenElement) {
      document.exitFullscreen();
      fullscreenBtn.textContent = "⛶ Fullscreen";
      return;
    }
    if (frame.requestFullscreen) {
      frame.requestFullscreen();
      fullscreenBtn.textContent = "✕ Exit Full";
    } else if (frame.webkitRequestFullscreen) {
      frame.webkitRequestFullscreen();
    }
  });

  document.addEventListener("fullscreenchange", function () {
    if (!document.fullscreenElement) {
      fullscreenBtn.innerHTML = "⛶ Fullscreen";
    }
  });

  blankBtn.addEventListener("click", function () {
    const newWin = window.open("about:blank", "_blank");
    if (!newWin) return;
    newWin.document.write(`
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <title>${currentGame.title} — Cosmos Hub</title>
        <style>
          html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
          iframe { border: none; width: 100vw; height: 100vh; display: block; }
        </style>
      </head>
      <body>
        <iframe src="${currentGame.url}" allowfullscreen referrerpolicy="no-referrer"></iframe>
      </body>
      </html>
    `);
    newWin.document.close();
  });
})();
</script>

</body>
</html>
