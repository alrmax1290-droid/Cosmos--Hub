<!DOCTYPE html>
<html lang="en">
<head>
<base href="https://cdn.jsdelivr.net/gh/freebuisness/gn-math-DONTDMCA@main/">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos Hub</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b5fff">

<style>
body {
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:#f1f5f9;
}

/* header */
header {
    background:#7b5fff;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    font-weight:bold;
    font-size:20px;
}

.search-container {
    display:flex;
    gap:8px;
}

input, select {
    padding:6px;
    border-radius:6px;
    border:none;
}

/* grid */
#container {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:15px;
    padding:15px;
}

.zone-item {
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.zone-item img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.zone-item button {
    width:100%;
    border:none;
    background:none;
    color:white;
    padding:10px;
    cursor:pointer;
}

/* viewer */
#zoneViewer {
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
}

.zone-header {
    background:#7b5fff;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

#zoneFrame {
    flex:1;
    width:100%;
    border:none;
}

/* popup */
#popupOverlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup {
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    max-width:400px;
    width:90%;
}

/* footer */
footer {
    background:#1e293b;
    padding:10px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<div class="logo">Cosmos Hub</div>

<div class="search-container">
<input id="searchBar" placeholder="Search..." oninput="filterZones()">
<select id="sortOptions" onchange="sortZones()">
<option value="name">Name</option>
<option value="id">ID</option>
</select>
</div>

<button onclick="openSettings()">⚙️</button>
</header>

<main>
<div id="container">Loading...</div>
</main>

<!-- viewer -->
<div id="zoneViewer">
<div class="zone-header">
<span id="zoneName">Zone</span>
<div>
<button onclick="closeZone()">Close</button>
</div>
</div>
<iframe id="zoneFrame"></iframe>
</div>

<!-- popup -->
<div id="popupOverlay">
<div class="popup">
<h3 id="popupTitle"></h3>
<div id="popupBody"></div>
<button onclick="closePopup()">Close</button>
</div>
</div>

<footer>
Cosmos Hub
</footer>

<script>
const container = document.getElementById("container");
const zoneViewer = document.getElementById("zoneViewer");
const zoneFrame = document.getElementById("zoneFrame");

let zones = [];

// fetch zones
async function listZones(){
    try{
        const res = await fetch("https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json");
        zones = await res.json();
        displayZones(zones);
    }catch(e){
        container.innerHTML = "Failed to load.";
    }
}

function displayZones(list){
    container.innerHTML = "";

    list.forEach(z=>{
        const div = document.createElement("div");
        div.className = "zone-item";

        const img = document.createElement("img");
        img.src = z.cover.replace("{COVER_URL}","https://cdn.jsdelivr.net/gh/freebuisness/covers@main");

        const btn = document.createElement("button");
        btn.textContent = z.name;

        div.onclick = ()=>openZone(z);

        div.appendChild(img);
        div.appendChild(btn);
        container.appendChild(div);
    });
}

// search
function filterZones(){
    const q = document.getElementById("searchBar").value.toLowerCase();
    displayZones(zones.filter(z=>z.name.toLowerCase().includes(q)));
}

// sort
function sortZones(){
    const val = document.getElementById("sortOptions").value;

    if(val==="name"){
        zones.sort((a,b)=>a.name.localeCompare(b.name));
    } else {
        zones.sort((a,b)=>a.id-b.id);
    }

    displayZones(zones);
}

// open zone
function openZone(z){
    const url = z.url.replace("{HTML_URL}","https://cdn.jsdelivr.net/gh/freebuisness/html@main");

    fetch(url)
    .then(r=>r.text())
    .then(html=>{
        zoneFrame.srcdoc = html;
        document.getElementById("zoneName").textContent = z.name;
        zoneViewer.style.display = "flex";
    });
}

// close
function closeZone(){
    zoneViewer.style.display = "none";
    zoneFrame.srcdoc = "";
}

// popup
function openSettings(){
    document.getElementById("popupTitle").textContent="Settings";
    document.getElementById("popupBody").innerHTML=`
    <button onclick="toggleDark()">Toggle Dark</button>
    `;
    document.getElementById("popupOverlay").style.display="flex";
}

function closePopup(){
    document.getElementById("popupOverlay").style.display="none";
}

// dark mode
function toggleDark(){
    document.body.classList.toggle("dark");
}

listZones();
</script>

</body>
</html>
